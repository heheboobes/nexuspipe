syntax = "proto3";

package nexuspipe.pipeline.v1;

option go_package = "github.com/heheboobes/nexuspipe/proto/pipeline/v1;pipelinev1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// =============================================================================
// Pipeline Definitions
// =============================================================================

message Pipeline {
  string id = 1;
  string name = 2;
  string description = 3;
  PipelineStatus status = 4;
  int32 version = 5;
  PipelineConfig config = 6;
  map<string, string> tags = 7;
  string created_by = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  google.protobuf.Timestamp deleted_at = 11;
}

enum PipelineStatus {
  PIPELINE_STATUS_UNSPECIFIED = 0;
  PIPELINE_STATUS_ACTIVE = 1;
  PIPELINE_STATUS_INACTIVE = 2;
  PIPELINE_STATUS_PAUSED = 3;
  PIPELINE_STATUS_ARCHIVED = 4;
  PIPELINE_STATUS_DRAFT = 5;
  PIPELINE_STATUS_FAILED = 6;
}

message PipelineConfig {
  int32 max_retries = 1;
  int32 timeout_seconds = 2;
  int32 concurrency = 3;
  int32 priority = 4;
  string queue_name = 5;
  string exchange_name = 6;
  string routing_key = 7;
  string error_handler = 8;
  string success_handler = 9;
  bool dlq_enabled = 10;
  string dlq_name = 11;
  int32 retry_backoff_ms = 12;
  int32 max_backoff_ms = 13;
  double backoff_multiplier = 14;
  string environment = 15;
  map<string, string> metadata = 16;
}

// =============================================================================
// Events
// =============================================================================

message Event {
  string id = 1;
  string pipeline_id = 2;
  string event_type = 3;
  string source = 4;
  EventStatus status = 5;
  int32 priority = 6;
  google.protobuf.Value body = 7;
  EventMetadata headers = 8;
  int32 retry_count = 9;
  int32 max_retries = 10;
  string correlation_id = 11;
  string causation_id = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  google.protobuf.Timestamp processed_at = 15;
  google.protobuf.Timestamp scheduled_at = 16;
  int32 ttl = 17;
}

enum EventStatus {
  EVENT_STATUS_UNSPECIFIED = 0;
  EVENT_STATUS_PENDING = 1;
  EVENT_STATUS_PROCESSING = 2;
  EVENT_STATUS_COMPLETED = 3;
  EVENT_STATUS_FAILED = 4;
  EVENT_STATUS_RETRYING = 5;
  EVENT_STATUS_CANCELLED = 6;
  EVENT_STATUS_DELAYED = 7;
  EVENT_STATUS_DEAD_LETTER = 8;
}

message EventMetadata {
  string content_type = 1;
  string encoding = 2;
  string schema_version = 3;
  string trace_id = 4;
  string span_id = 5;
  string user_agent = 6;
  string ip_address = 7;
  string idempotency_key = 8;
  map<string, string> custom = 9;
}

// =============================================================================
// Tasks
// =============================================================================

message Task {
  string id = 1;
  string pipeline_id = 2;
  string event_id = 3;
  string parent_task_id = 4;
  string name = 5;
  TaskType type = 6;
  TaskStatus status = 7;
  int32 priority = 8;
  int32 sequence = 9;
  google.protobuf.Value input = 10;
  google.protobuf.Value output = 11;
  string error = 12;
  TaskConfig config = 13;
  int32 retry_count = 14;
  int32 max_retries = 15;
  int32 timeout_seconds = 16;
  string worker_id = 17;
  google.protobuf.Timestamp started_at = 18;
  google.protobuf.Timestamp completed_at = 19;
  int64 duration_ms = 20;
  google.protobuf.Timestamp scheduled_at = 21;
  google.protobuf.Timestamp created_at = 22;
  google.protobuf.Timestamp updated_at = 23;
}

enum TaskType {
  TASK_TYPE_UNSPECIFIED = 0;
  TASK_TYPE_HTTP = 1;
  TASK_TYPE_GRPC = 2;
  TASK_TYPE_SCRIPT = 3;
  TASK_TYPE_SQL = 4;
  TASK_TYPE_SHELL = 5;
  TASK_TYPE_WEBHOOK = 6;
  TASK_TYPE_TRANSFORM = 7;
  TASK_TYPE_NOTIFICATION = 8;
  TASK_TYPE_CUSTOM = 9;
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING = 1;
  TASK_STATUS_SCHEDULED = 2;
  TASK_STATUS_RUNNING = 3;
  TASK_STATUS_COMPLETED = 4;
  TASK_STATUS_FAILED = 5;
  TASK_STATUS_CANCELLED = 6;
  TASK_STATUS_RETRYING = 7;
  TASK_STATUS_PAUSED = 8;
  TASK_STATUS_TIMED_OUT = 9;
  TASK_STATUS_SKIPPED = 10;
}

message TaskConfig {
  string method = 1;
  string url = 2;
  map<string, string> headers = 3;
  map<string, string> query_params = 4;
  string body = 5;
  string script = 6;
  string command = 7;
  string sql = 8;
  string service_name = 9;
  string endpoint = 10;
  string proto_file = 11;
  bool retryable = 12;
  int32 retry_backoff_ms = 13;
  string condition = 14;
  string transform = 15;
  map<string, string> output_mapping = 16;
  bool notify_on_failure = 17;
  string notify_channel = 18;
}

message TaskDependency {
  string task_id = 1;
  string depends_on = 2;
  bool mandatory = 3;
}

// =============================================================================
// Schedules
// =============================================================================

message Schedule {
  string id = 1;
  string pipeline_id = 2;
  string cron_expression = 3;
  string timezone = 4;
  ScheduleStatus status = 5;
  bool enabled = 6;
  int32 priority = 7;
  int32 max_concurrent_runs = 8;
  repeated string tags = 9;
  google.protobuf.Struct metadata = 10;
  google.protobuf.Timestamp next_run_time = 11;
  google.protobuf.Timestamp last_run_time = 12;
  string created_by = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

enum ScheduleStatus {
  SCHEDULE_STATUS_UNSPECIFIED = 0;
  SCHEDULE_STATUS_ACTIVE = 1;
  SCHEDULE_STATUS_PAUSED = 2;
  SCHEDULE_STATUS_FAILED = 3;
  SCHEDULE_STATUS_DELETED = 4;
}

message ScheduleTrigger {
  string schedule_id = 1;
  string pipeline_id = 2;
  google.protobuf.Timestamp triggered_at = 3;
  string skip_reason = 4;
  bool executed = 5;
}

// =============================================================================
// Execution & Pipeline Runs
// =============================================================================

message PipelineExecution {
  string id = 1;
  string pipeline_id = 2;
  PipelineStatus status = 3;
  string input = 4;
  string output = 5;
  string error = 6;
  google.protobuf.Timestamp started_at = 7;
  google.protobuf.Timestamp completed_at = 8;
  int64 duration_ms = 9;
  int32 retry_count = 10;
  string triggered_by = 11;
  google.protobuf.Timestamp created_at = 12;
}

message PipelineVersion {
  string id = 1;
  string pipeline_id = 2;
  int32 version = 3;
  PipelineConfig config = 4;
  string changelog = 5;
  bool published = 6;
  string created_by = 7;
  google.protobuf.Timestamp created_at = 8;
}

// =============================================================================
// Webhooks
// =============================================================================

message Webhook {
  string id = 1;
  string name = 2;
  string url = 3;
  string pipeline_id = 4;
  string secret = 5;
  repeated string events = 6;
  map<string, string> headers = 7;
  bool active = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message WebhookDelivery {
  string id = 1;
  string webhook_id = 2;
  string event_type = 3;
  string url = 4;
  string status = 5;
  int32 status_code = 6;
  string request_body = 7;
  string response_body = 8;
  int64 duration_ms = 9;
  int32 attempt = 10;
  int32 max_retries = 11;
  string error = 12;
  google.protobuf.Timestamp created_at = 13;
}

// =============================================================================
// Internal Pipeline Events (EventBus)
// =============================================================================

message PipelineEvent {
  EventType type = 1;
  string pipeline_id = 2;
  string run_id = 3;
  string stage_name = 4;
  string error = 5;
  map<string, google.protobuf.Value> metadata = 6;
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_PIPELINE_STARTED = 1;
  EVENT_TYPE_PIPELINE_COMPLETED = 2;
  EVENT_TYPE_PIPELINE_FAILED = 3;
  EVENT_TYPE_PIPELINE_RETRYING = 4;
  EVENT_TYPE_PIPELINE_CANCELLED = 5;
  EVENT_TYPE_PIPELINE_PAUSED = 6;
  EVENT_TYPE_STAGE_STARTED = 7;
  EVENT_TYPE_STAGE_COMPLETED = 8;
  EVENT_TYPE_STAGE_FAILED = 9;
  EVENT_TYPE_STAGE_RETRYING = 10;
  EVENT_TYPE_STAGE_SKIPPED = 11;
  EVENT_TYPE_RUN_CREATED = 12;
  EVENT_TYPE_RUN_FINISHED = 13;
}

// =============================================================================
// gRPC Service Definitions
// =============================================================================

service PipelineService {
  rpc CreatePipeline(CreatePipelineRequest) returns (CreatePipelineResponse);
  rpc GetPipeline(GetPipelineRequest) returns (GetPipelineResponse);
  rpc ListPipelines(ListPipelinesRequest) returns (ListPipelinesResponse);
  rpc UpdatePipeline(UpdatePipelineRequest) returns (UpdatePipelineResponse);
  rpc DeletePipeline(DeletePipelineRequest) returns (DeletePipelineResponse);
  rpc ExecutePipeline(ExecutePipelineRequest) returns (ExecutePipelineResponse);
}

service EventService {
  rpc EmitEvent(EmitEventRequest) returns (EmitEventResponse);
  rpc GetEvent(GetEventRequest) returns (GetEventResponse);
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc UpdateEventStatus(UpdateEventStatusRequest) returns (UpdateEventStatusResponse);
}

service TaskService {
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc RetryTask(RetryTaskRequest) returns (RetryTaskResponse);
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
}

service ScheduleService {
  rpc CreateSchedule(CreateScheduleRequest) returns (CreateScheduleResponse);
  rpc GetSchedule(GetScheduleRequest) returns (GetScheduleResponse);
  rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse);
  rpc UpdateSchedule(UpdateScheduleRequest) returns (UpdateScheduleResponse);
  rpc DeleteSchedule(DeleteScheduleRequest) returns (DeleteScheduleResponse);
  rpc ToggleSchedule(ToggleScheduleRequest) returns (ToggleScheduleResponse);
}

// =============================================================================
// RPC Request/Response Messages
// =============================================================================

message CreatePipelineRequest {
  string name = 1;
  string description = 2;
  PipelineConfig config = 3;
  map<string, string> tags = 4;
}

message CreatePipelineResponse {
  Pipeline pipeline = 1;
}

message GetPipelineRequest {
  string id = 1;
}

message GetPipelineResponse {
  Pipeline pipeline = 1;
}

message ListPipelinesRequest {
  string status = 1;
  string search = 2;
  int32 page = 3;
  int32 per_page = 4;
}

message ListPipelinesResponse {
  repeated Pipeline pipelines = 1;
  int32 total = 2;
  int32 page = 3;
  int32 per_page = 4;
}

message UpdatePipelineRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  PipelineStatus status = 4;
  PipelineConfig config = 5;
  map<string, string> tags = 6;
}

message UpdatePipelineResponse {
  Pipeline pipeline = 1;
}

message DeletePipelineRequest {
  string id = 1;
}

message DeletePipelineResponse {}

message ExecutePipelineRequest {
  string pipeline_id = 1;
  string input = 2;
  string triggered_by = 3;
}

message ExecutePipelineResponse {
  PipelineExecution execution = 1;
}

message EmitEventRequest {
  string event_type = 1;
  string source = 2;
  string pipeline_id = 3;
  int32 priority = 4;
  google.protobuf.Value body = 5;
  EventMetadata headers = 6;
  google.protobuf.Timestamp scheduled_at = 7;
  int32 ttl = 8;
}

message EmitEventResponse {
  Event event = 1;
}

message GetEventRequest {
  string id = 1;
}

message GetEventResponse {
  Event event = 1;
}

message ListEventsRequest {
  string status = 1;
  repeated string event_types = 2;
  string source = 3;
  string pipeline_id = 4;
  google.protobuf.Timestamp from = 5;
  google.protobuf.Timestamp to = 6;
  string search = 7;
  int32 page = 8;
  int32 per_page = 9;
}

message ListEventsResponse {
  repeated Event events = 1;
  int32 total = 2;
  int32 page = 3;
  int32 per_page = 4;
}

message UpdateEventStatusRequest {
  string id = 1;
  EventStatus status = 2;
}

message UpdateEventStatusResponse {
  Event event = 1;
}

message GetTaskRequest {
  string id = 1;
}

message GetTaskResponse {
  Task task = 1;
}

message ListTasksRequest {
  string pipeline_id = 1;
  string status = 2;
  repeated TaskType types = 3;
  int32 page = 4;
  int32 per_page = 5;
}

message ListTasksResponse {
  repeated Task tasks = 1;
  int32 total = 2;
  int32 page = 3;
  int32 per_page = 4;
}

message RetryTaskRequest {
  string id = 1;
}

message RetryTaskResponse {
  Task task = 1;
}

message CancelTaskRequest {
  string id = 1;
}

message CancelTaskResponse {}

message CreateScheduleRequest {
  string pipeline_id = 1;
  string cron_expression = 2;
  string timezone = 3;
  int32 priority = 4;
  int32 max_concurrent_runs = 5;
  repeated string tags = 6;
  google.protobuf.Struct metadata = 7;
}

message CreateScheduleResponse {
  Schedule schedule = 1;
}

message GetScheduleRequest {
  string id = 1;
}

message GetScheduleResponse {
  Schedule schedule = 1;
}

message ListSchedulesRequest {
  string status = 1;
  int32 page = 2;
  int32 per_page = 3;
}

message ListSchedulesResponse {
  repeated Schedule schedules = 1;
  int32 total = 2;
  int32 page = 3;
  int32 per_page = 4;
}

message UpdateScheduleRequest {
  string id = 1;
  string cron_expression = 2;
  string timezone = 3;
  int32 priority = 4;
  int32 max_concurrent_runs = 5;
  repeated string tags = 6;
  google.protobuf.Struct metadata = 7;
}

message UpdateScheduleResponse {
  Schedule schedule = 1;
}

message DeleteScheduleRequest {
  string id = 1;
}

message DeleteScheduleResponse {}

message ToggleScheduleRequest {
  string id = 1;
  bool enabled = 2;
}

message ToggleScheduleResponse {
  Schedule schedule = 1;
}
