x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-common-env: &common-env
  NEXUSPIPE_DB_HOST: postgres
  NEXUSPIPE_DB_PORT: 5432
  NEXUSPIPE_DB_USER: nexuspipe
  NEXUSPIPE_DB_PASSWORD: ${NEXUSPIPE_DB_PASSWORD:-nexuspipe_secret}
  NEXUSPIPE_DB_NAME: nexuspipe
  NEXUSPIPE_DB_SSLMODE: disable
  NEXUSPIPE_AMQP_URL: amqp://nexuspipe:${NEXUSPIPE_AMQP_PASSWORD:-nexuspipe_amqp}@rabbitmq:5672/
  NEXUSPIPE_REDIS_URL: redis://redis:6379/0
  NEXUSPIPE_CONSUL_ADDR: consul:8500
  NEXUSPIPE_LOG_LEVEL: ${NEXUSPIPE_LOG_LEVEL:-info}

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexuspipe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexuspipe
      POSTGRES_PASSWORD: ${NEXUSPIPE_DB_PASSWORD:-nexuspipe_secret}
      POSTGRES_DB: nexuspipe
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexuspipe -d nexuspipe"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging
    networks:
      - nexuspipe-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nexuspipe-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: nexuspipe
      RABBITMQ_DEFAULT_PASS: ${NEXUSPIPE_AMQP_PASSWORD:-nexuspipe_amqp}
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-nexuspipe_cookie}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - rabbitmq-logs:/var/log/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    logging: *default-logging
    networks:
      - nexuspipe-net

  redis:
    image: redis:7-alpine
    container_name: nexuspipe-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${NEXUSPIPE_REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging
    networks:
      - nexuspipe-net

  consul:
    image: consul:1.18
    container_name: nexuspipe-consul
    restart: unless-stopped
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0 -bind=0.0.0.0
    volumes:
      - consul-data:/consul/data
    ports:
      - "8500:8500"
    logging: *default-logging
    networks:
      - nexuspipe-net

  nexuspipe-api:
    image: ${REGISTRY:-nexuspipe}/api:${TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        TARGET: api
    container_name: nexuspipe-api
    restart: unless-stopped
    environment:
      <<: *common-env
      NEXUSPIPE_SERVICE: api
      NEXUSPIPE_HTTP_PORT: 8080
      NEXUSPIPE_METRICS_PORT: 9090
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging
    networks:
      - nexuspipe-net

  nexuspipe-worker:
    image: ${REGISTRY:-nexuspipe}/worker:${TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        TARGET: worker
    container_name: nexuspipe-worker
    restart: unless-stopped
    environment:
      <<: *common-env
      NEXUSPIPE_SERVICE: worker
      NEXUSPIPE_WORKER_CONCURRENCY: ${NEXUSPIPE_WORKER_CONCURRENCY:-10}
      NEXUSPIPE_METRICS_PORT: 9091
    ports:
      - "9091:9091"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging
    networks:
      - nexuspipe-net

  nexuspipe-scheduler:
    image: ${REGISTRY:-nexuspipe}/scheduler:${TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        TARGET: scheduler
    container_name: nexuspipe-scheduler
    restart: unless-stopped
    environment:
      <<: *common-env
      NEXUSPIPE_SERVICE: scheduler
      NEXUSPIPE_SCHEDULER_TICK: 30
      NEXUSPIPE_METRICS_PORT: 9092
    ports:
      - "9092:9092"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging
    networks:
      - nexuspipe-net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: nexuspipe-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9093:9090"
    logging: *default-logging
    networks:
      - nexuspipe-net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: nexuspipe-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    logging: *default-logging
    networks:
      - nexuspipe-net

volumes:
  postgres-data:
  rabbitmq-data:
  rabbitmq-logs:
  redis-data:
  consul-data:
  prometheus-data:
  grafana-data:

networks:
  nexuspipe-net:
    driver: bridge
