app:
  name: nexuspipe
  environment: production
  version: 1.0.0
  host: 0.0.0.0
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  shutdown_grace_period: 15s
  cors_origins:
    - https://app.nexuspipe.io

database:
  host: postgres
  port: 5432
  user: nexuspipe
  password: ${DB_PASSWORD}
  dbname: nexuspipe
  sslmode: require
  max_open_conns: 50
  max_idle_conns: 15
  conn_max_lifetime: 5m
  conn_max_idle_time: 1m
  migrations_path: /migrations

rabbitmq:
  host: rabbitmq
  port: 5672
  user: guest
  password: ${RABBIT_PASSWORD}
  vhost: /
  exchange: nexuspipe.events
  queue_prefix: nexuspipe
  prefetch_count: 50
  reconnect_interval: 5s
  max_retries: 5

redis:
  host: redis
  port: 6379
  password: ${REDIS_PASSWORD}
  db: 0
  pool_size: 20
  min_idle_conns: 5

auth:
  jwt_secret: ${JWT_SECRET}
  jwt_ttl: 24h
  refresh_ttl: 720h
  issuer: nexuspipe
  bcrypt_cost: 12
  rate_limit_per_min: 100

metrics:
  enabled: true
  path: /metrics
  namespace: nexuspipe
  subsystem: api
  buckets:
    - 0.001
    - 0.005
    - 0.01
    - 0.025
    - 0.05
    - 0.1
    - 0.25
    - 0.5
    - 1.0

worker:
  concurrency: 25
  poll_interval: 1s
  max_retries: 3
  retry_backoff: 5s
  queue_names:
    - nexuspipe.tasks.default
    - nexuspipe.tasks.priority
  heartbeat_interval: 30s

scheduler:
  enabled: true
  timezone: UTC

pipeline_engine:
  max_stage_timeout: 30m
  default_retries: 3
  max_concurrency: 50
  stage_buffer_size: 1000
  enable_tracing: true
  metrics_flush_sec: 10

circuit_breaker:
  enabled: true
  failure_threshold: 5
  success_threshold: 2
  timeout: 30s
  half_open_max_requests: 3

webhook:
  max_retries: 5
  retry_backoff: 30s
  max_payload_size: 1048576
  timeout: 10s
  concurrency_limit: 20
  queue_name: nexuspipe.webhooks

log:
  level: info
  format: json
  output_path: stdout
  error_path: stderr
  add_source: true
  sampling: false
  encoding: json
