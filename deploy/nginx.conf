upstream nexuspipe_api {
    zone upstream_nexuspipe 64k;
    server nexuspipe-api:8080 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/s;
limit_req_zone $http_x_api_key zone=api_key_limit:10m rate=200r/s;

limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=nexuspipe_cache:10m max_size=1g inactive=60m use_temp_path=off;

server {
    listen 80;
    server_name api.nexuspipe.local;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.nexuspipe.local;

    ssl_certificate     /etc/nginx/ssl/nexuspipe.crt;
    ssl_certificate_key /etc/nginx/ssl/nexuspipe.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    resolver 127.0.0.11 valid=30s;

    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 15s;
    send_timeout 15s;
    keepalive_timeout 65;
    keepalive_requests 1000;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        limit_req zone=api_limit burst=200 nodelay;
        limit_conn addr_limit 50;

        proxy_pass http://nexuspipe_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
        proxy_cache nexuspipe_cache;
        proxy_cache_bypass $http_cache_control;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 60s;
        proxy_cache_valid 404 10s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        add_header X-Cache-Status $upstream_cache_status;
        add_header X-Request-ID $upstream_http_x_request_id;

        location /api/v1/health {
            proxy_cache off;
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://nexuspipe_api;
        }

        location /api/v1/metrics {
            internal;
            proxy_cache off;
            proxy_pass http://nexuspipe_api;
        }

        location /api/v1/admin {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_conn addr_limit 5;
            proxy_cache off;
            proxy_pass http://nexuspipe_api;
        }
    }

    location /ws {
        proxy_pass http://nexuspipe_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /rabbitmq {
        proxy_pass http://rabbitmq:15672/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /nginx-status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}

server {
    listen 80;
    server_name nexuspipe.local;
    return 444;
}
